; InfinityEngine-Enhancer sample configuration
; Place in the game root, next to the game executable, and adjust only when needed.

[Core]
VerboseLogs = false
; Aggregate RenderTexture enhancement timings every five seconds.
PerformanceLogs = false

[Rendering]
EnableAnisotropicFiltering = false
MaxAnisotropy = 8.0
LODBias = -0.25

[Detection]
; Collect the current area's authored ambient animations from engine memory
; and classify fire/smoke/fountain/light point sources.
AreaAnimationScan = true

[Shaders]
; Diagnostic only: archive original shaders to iee-shader-dumps/ next to the DLL.
DumpEngineShaders = false
; F10 toggles the visual effect of overrides (uIeeEnabled) for A/B comparison.
EnableDebugHotkeys = false
; Start the bundled water shader enabled when it is installed in the game's override directory.
EnableWaterEffect = true
; Fire glow/heat shimmer, chimney-smoke haze, and candle glows placed from the
; area's classified ambient animations (requires the fpSEAM override).
EnablePointEffects = true
