; InfinityEngine-Enhancer sample configuration
; Place next to InfinityEngine-Enhancer.dll and adjust only when needed.

[Core]
VerboseLogs = false

[Auto-Generated]
CachedLoadAreaRVA = 0x27E710
CachedRenderTextureRVA = 0x4247E0

[Rendering]
EnableAnisotropicFiltering = false
MaxAnisotropy = 8.0
LODBias = -0.25

[Addresses]
FallbackLoadAreaRVA = 0x27E710
FallbackRenderTextureRVA = 0x4247E0

[Shaders]
; Master switch for GLSL source replacement (files from OverrideDir).
EnableOverrides = false
; Archive the engine's original shaders to iee-shader-dumps/ next to the DLL.
DumpEngineShaders = true
; Directory of <name>.glsl replacement files, relative to the DLL.
OverrideDir = iee-shaders
; Comma-separated fragment shader names to flood magenta (coverage debugging).
MagentaShaders =
; F10 toggles the visual effect of overrides (uIeeEnabled) for A/B comparison.
EnableDebugHotkeys = false
