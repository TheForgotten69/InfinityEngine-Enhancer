name: Build and Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Configure CMake
      run: cmake -B build -G "Visual Studio 17 2022" -A x64 -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build --config Release --parallel

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: InfinityEngine-Enhancer-${{ github.sha }}
        path: build/Release/InfinityEngine-Enhancer.dll

  alpha-release:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest

    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: InfinityEngine-Enhancer-${{ github.sha }}

    - name: Generate version
      id: version
      run: echo "sha=${GITHUB_SHA:0:7}" >> $GITHUB_OUTPUT

    - name: Delete existing alpha release
      continue-on-error: true
      run: gh release delete alpha --yes
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Create Alpha Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: alpha
        name: "Alpha Build (${{ steps.version.outputs.sha }})"
        files: InfinityEngine-Enhancer.dll
        body: |
          Alpha build from commit ${{ github.sha }}

          **⚠️ Unstable development build**
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest

    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: InfinityEngine-Enhancer-${{ github.sha }}

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: InfinityEngine-Enhancer.dll
        draft: true